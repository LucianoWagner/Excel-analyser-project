<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con tu Excel</title>
    <meta name="description" content="Subí tu Excel y hacele preguntas en lenguaje natural con IA">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- ══════════════ LOGIN VIEW ══════════════ -->
    <div id="login-view" class="login-container">
        <div class="login-card">
            <h1>Chat con tu Excel</h1>
            <p class="subtitle">Subí tu Excel y preguntale lo que quieras</p>

            <div id="login-alert" class="alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Usuario</label>
                    <input type="text" id="login-username" placeholder="Tu nombre de usuario" required
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="Tu contraseña" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" id="login-btn">Iniciar sesión</button>
            </form>

            <div class="login-footer">
                <span id="login-toggle-text">¿No tenés cuenta? <a id="toggle-register">Registrate</a></span>
            </div>
        </div>
    </div>

    <!-- ══════════════ CHAT VIEW ══════════════ -->
    <div id="chat-view" class="chat-container">

        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-left">
                <span class="logo">Chat con tu Excel</span>
                <span id="session-badge" class="session-badge no-file">
                    Sin archivo
                </span>
            </div>
            <div class="chat-header-right">
                <div class="user-badge">
                    <span class="username" id="header-username">admin</span>
                    <span class="role" id="header-role">admin</span>
                </div>
                <button class="btn-icon" id="btn-logout" title="Cerrar sesión">⏻</button>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages">
            <div class="welcome-container" id="welcome-msg">
                <h2>Bienvenido</h2>
                <p>Subí un archivo Excel para empezar a hacerle preguntas con inteligencia artificial.</p>
            </div>
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <!-- Upload zone (toggleable) -->
            <div class="upload-zone" id="upload-zone">
                <div class="upload-zone-icon">📂</div>
                <div class="upload-zone-text">
                    Arrastrá tu archivo Excel acá o <strong>hacé click</strong>
                </div>
                <input type="file" id="file-input" accept=".xlsx,.xls" hidden>
            </div>

            <!-- Help guide (shown after upload, populated dynamically) -->
            <div class="help-guide" id="help-guide">
                <button class="help-toggle" id="help-toggle">💡 ¿Qué puedo preguntar? <span
                        class="help-arrow">▾</span></button>
                <div class="help-content" id="help-content">
                    <!-- Chips are generated dynamically from uploaded columns -->
                </div>
            </div>

            <!-- Sheet selector -->
            <div class="sheet-selector" id="sheet-selector">
                <label for="sheet-select">Sheet:</label>
                <select id="sheet-select"></select>
            </div>

            <!-- Input row -->
            <div class="chat-input-row">
                <button class="btn-upload-toggle" id="btn-upload-toggle" title="Subir Excel">📎</button>
                <textarea id="chat-input" placeholder="Escribí tu pregunta sobre el Excel..." rows="1"
                    disabled></textarea>
                <button class="btn-send" id="btn-send" disabled title="Enviar">➤</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
